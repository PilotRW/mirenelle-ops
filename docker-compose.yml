services:
  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8010 --reload
    volumes:
      - .:/code
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://oa:oa@host.docker.internal:5432/mirenelle_ops
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://oa:oa@host.docker.internal:5432/mirenelle_ops
